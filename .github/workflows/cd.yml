name: CD Pipeline (Third-Party Deployment)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (latest, v1.0)'
        required: true
        default: 'latest'

env:
  DOCKER_USERNAME: xrays351
  DOCKER_IMAGE_BACKEND: xrays351/boda-backend
  DOCKER_IMAGE_FRONTEND: xrays351/boda-frontend

jobs:
  # ✅ TASK 6: FAILURE HANDLING - Deployment only if tests pass
  pre-deploy-check:
    runs-on: ubuntu-latest
    steps:
      - name: Verify Docker Hub images exist
        run: |
          echo "Checking if images exist on Docker Hub..."
          # This will fail if images don't exist
          docker manifest inspect ${{ env.DOCKER_IMAGE_BACKEND }}:latest > /dev/null || exit 1
          docker manifest inspect ${{ env.DOCKER_IMAGE_FRONTEND }}:latest > /dev/null || exit 1
          echo "✅ Images exist on Docker Hub"

  production-deploy:
    needs: pre-deploy-check
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Pull from Docker Hub
        run: |
          VERSION=${{ github.event.inputs.version || 'latest' }}
          echo "Deploying version: $VERSION"
          docker pull ${{ env.DOCKER_IMAGE_BACKEND }}:$VERSION
          docker pull ${{ env.DOCKER_IMAGE_FRONTEND }}:$VERSION
      
      - name: Deploy to Production
        run: |
          docker stop twendego-backend twendego-frontend 2>/dev/null || true
          docker rm twendego-backend twendego-frontend 2>/dev/null || true
          
          docker run -d --name twendego-backend \
            -p 8000:8000 \
            --link mosquitto \
            ${{ env.DOCKER_IMAGE_BACKEND }}:${{ github.event.inputs.version || 'latest' }}
          
          docker run -d --name twendego-frontend \
            -p 80:5173 \
            --link twendego-backend \
            ${{ env.DOCKER_IMAGE_FRONTEND }}:${{ github.event.inputs.version || 'latest' }}
      
      - name: Verify MQTT in Production
        run: |
          docker exec mosquitto mosquitto_pub -h localhost -p 1883 -t "twendego/production" -m "Deployed"
          echo "✅ MQTT verified in production"
      
      - name: Deployment Complete
        run: |
          echo "=================================="
          echo "PRODUCTION DEPLOYMENT COMPLETE!"
          echo "Version: ${{ github.event.inputs.version || 'latest' }}"
          echo "Source: Docker Hub"
          echo "=================================="