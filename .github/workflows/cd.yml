name: CD - Build and Push to Docker Hub

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/twendego-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/twendego-backend:${{ github.sha }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/twendego-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/twendego-frontend:${{ github.sha }}

      - name: Deployment Summary
        run: |
          echo "========================================="
          echo "✅ CD Pipeline Completed Successfully!"
          echo "========================================="
          echo "Images pushed to Docker Hub:"
          echo "  - ${{ secrets.DOCKER_USERNAME }}/twendego-backend:latest"
          echo "  - ${{ secrets.DOCKER_USERNAME }}/twendego-frontend:latest"
          echo "========================================="
