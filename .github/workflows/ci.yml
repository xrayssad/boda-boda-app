name: CI Pipeline (MQTT Enabled)

on:
  push:
    branches: [main]
    tags:
      - 'v*'

env:
  DOCKER_USERNAME: xrays351
  DOCKER_IMAGE_BACKEND: xrays351/boda-backend
  DOCKER_IMAGE_FRONTEND: xrays351/boda-frontend

jobs:
  # ========================
  # 1. TEST STAGE
  # ========================
  test:
    runs-on: ubuntu-latest
    services:
      mosquitto:
        image: eclipse-mosquitto:latest
        ports:
          - 1883:1883
          - 9001:9001
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          pip install paho-mqtt pytest
      
      - name: MQTT Connection Test
        run: |
          python -c "
          import paho.mqtt.client as mqtt
          import time
          client = mqtt.Client()
          client.connect('localhost', 1883, 60)
          client.publish('test', 'CI/CD Test')
          print('✅ MQTT test passed')
          "
      
      - name: Unit Tests (Fail if any fail)
        run: |
          pytest tests/ || exit 1

  # ========================
  # 2. BUILD & PUSH TO DOCKER HUB
  # ========================
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      # ✅ TASK 5: VERSION TAGGING
      - name: Get version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="latest"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"
      
      # ✅ TASK 5: Build with multiple tags
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_BACKEND }}:latest
            ${{ env.DOCKER_IMAGE_BACKEND }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKER_IMAGE_BACKEND }}:v1.0
      
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_FRONTEND }}:latest
            ${{ env.DOCKER_IMAGE_FRONTEND }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKER_IMAGE_FRONTEND }}:v1.0

  # ========================
  # 3. DEPLOY FROM DOCKER HUB (TASK 3)
  # ========================
  deploy-from-registry:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Pull and Deploy from Docker Hub
        run: |
          echo "=================================="
          echo "DEPLOYING FROM DOCKER HUB"
          echo "=================================="
          
          # Stop old containers
          docker stop twendego-backend twendego-frontend mosquitto 2>/dev/null || true
          docker rm twendego-backend twendego-frontend mosquitto 2>/dev/null || true
          
          # Pull images from Docker Hub
          docker pull ${{ env.DOCKER_IMAGE_BACKEND }}:latest
          docker pull ${{ env.DOCKER_IMAGE_FRONTEND }}:latest
          
          # Start Mosquitto
          docker run -d --name mosquitto -p 1883:1883 -p 9001:9001 eclipse-mosquitto
          
          # Start Backend
          docker run -d --name twendego-backend \
            -p 8000:8000 \
            --link mosquitto \
            ${{ env.DOCKER_IMAGE_BACKEND }}:latest
          
          # Start Frontend
          docker run -d --name twendego-frontend \
            -p 5173:5173 \
            --link twendego-backend \
            ${{ env.DOCKER_IMAGE_FRONTEND }}:latest
          
          echo "✅ Deployed from Docker Hub!"
      
      # ✅ TASK 6: FAILURE HANDLING - Verify deployment
      - name: Verify Deployment
        run: |
          sleep 10
          if ! docker ps | grep -q twendego-backend; then
            echo "❌ Backend failed to start!"
            docker logs twendego-backend --tail 20
            exit 1
          fi
          if ! docker ps | grep -q twendego-frontend; then
            echo "❌ Frontend failed to start!"
            exit 1
          fi
          echo "✅ All containers running successfully!"
      
      # ✅ TASK 4: MQTT still works after deployment
      - name: Verify MQTT after deployment
        run: |
          docker exec mosquitto mosquitto_pub -h localhost -p 1883 -t "twendego/test" -m "Deployment Success"
          echo "✅ MQTT verified after deployment"
      
      - name: Deployment Status
        run: |
          echo "=================================="
          echo "DEPLOYMENT SUCCESSFUL!"
          echo "Images pulled from: Docker Hub"
          echo "Containers running:"
          docker ps --format "table {{.Names}}\t{{.Status}}"
          echo "=================================="