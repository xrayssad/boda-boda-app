name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest

      - name: Run unit tests
        run: |
          pytest tests/

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Backend Image
        run: |
          docker build -f Dockerfile.backend -t xrays351/boda-backend:latest .

      - name: Build Frontend Image
        run: |
          docker build -f Dockerfile.frontend -t xrays351/boda-frontend:latest .

  push-to-dockerhub:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Backend
        run: |
          docker build -f Dockerfile.backend -t xrays351/boda-backend:latest .
          docker push xrays351/boda-backend:latest

      - name: Push Frontend
        run: |
          docker build -f Dockerfile.frontend -t xrays351/boda-frontend:latest .
          docker push xrays351/boda-frontend:latest

  staging:
    needs: push-to-dockerhub
    runs-on: ubuntu-latest

    steps:
      - name: Simulate Staging Deployment
        run: |
          echo "Deploying to staging..."
          echo "Staging deployment successful"

  production:
    needs: staging
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Production Deployment
        run: |
          echo "Deploying to production..."
          echo "Production deployed successfully"
