name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:

# ========================
# 1. TEST STAGE
# ========================
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/

# ========================
# 2. BUILD DOCKER IMAGES
# ========================
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Backend Image
        run: |
          docker build -f Dockerfile.backend -t xrays351/boda-backend:latest .

      - name: Build Frontend Image
        run: |
          docker build -f Dockerfile.frontend -t xrays351/boda-frontend:latest .

# ========================
# 3. PUSH TO DOCKERHUB
# ========================
  push-to-dockerhub:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Images
        run: |
          docker build -f Dockerfile.backend -t xrays351/boda-backend:latest .
          docker build -f Dockerfile.frontend -t xrays351/boda-frontend:latest .

      - name: Push Backend
        run: |
          docker push xrays351/boda-backend:latest

      - name: Push Frontend
        run: |
          docker push xrays351/boda-frontend:latest

# ========================
# 4. STAGING DEPLOYMENT
# ========================
  staging:
    needs: push-to-dockerhub
    runs-on: ubuntu-latest

    steps:
      - name: Simulate Staging Deployment
        run: |
          echo "=================================="
          echo "Deploying to STAGING environment"
          echo "Pulling latest Docker images..."
          echo "Starting containers..."
          echo "Staging deployment SUCCESSFUL"
          echo "=================================="

# ========================
# 5. PRODUCTION (APPROVAL GATE)
# ========================
  production:
    needs: staging
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Production Deployment
        run: |
          echo "=================================="
          echo "PRODUCTION DEPLOYMENT STARTED"
          echo "Waiting for approval gate..."
          echo "Deploying application..."
          echo "PRODUCTION DEPLOYMENT SUCCESSFUL"
          echo "=================================="
