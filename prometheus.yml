global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'twendego-frontend'
    static_configs:
      - targets: ['boda-boda-app-frontend-1:5174']

  - job_name: 'twendego-backend'
    static_configs:
      - targets: ['boda-boda-app-django-backend-1:8000']
